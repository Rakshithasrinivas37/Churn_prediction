name: Churn Prediction CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Train Model First
  # ─────────────────────────────────────────
  train:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python src/train.py        # ✅ Updated path

      - name: Verify model file exists
        run: |
          if [ -f "models/model_C=1.0.bin" ]; then
            echo "✅ Model file created: model_C=1.0.bin"
          else
            echo "❌ Model file not found!"
            exit 1
          fi

      - name: Upload trained model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: churn-model
          path: models/model_C=1.0.bin
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Run Tests (after model is trained)
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: train                        # Only runs if train passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: churn-model             # Download model from Job 1

      - name: Verify model file downloaded
        run: | 
          if [ -f "model_C=1.0.bin" ]; then
            echo "✅ Model file ready for testing"
          else
            echo "❌ Model file missing!"
            exit 1
          fi

      - name: Start Flask server (predict.py)
        run: |
          python src/predict.py &       # ✅ Updated path
          sleep 3                       # Wait for server to start

      - name: Run tests
        run: python tests/test.py       # ✅ Updated path