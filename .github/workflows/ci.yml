name: Churn Prediction CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Train Model First
  # ─────────────────────────────────────────
  train:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python src/train.py        # ✅ Updated path

      - name: Verify model file exists
        run: |
          if [ -f "models/model_C=1.0.bin" ]; then
            echo "✅ Model file created: models/model_C=1.0.bin"
          else
            echo "❌ Model file not found!"
            exit 1
          fi

      - name: Upload trained model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: churn-model
          path: models/model_C=1.0.bin
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Run Tests (after model is trained)
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: train                        # Only runs if train passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: churn-model             # Download model from Job 1

      - name: Verify model file downloaded
        run: | 
          echo "📂 Listing all files after download:"
          find . -name "*.bin"
          if [ -f "models/model_C=1.0.bin" ]; then
            echo "✅ Model file ready for testing"
          else
            echo "❌ Model file missing!"
            exit 1
          fi

      - name: Start Flask server (predict.py)
        run: |
          python src/predict.py &       # ✅ Updated path
          sleep 3                       # Wait for server to start

      - name: Run tests
        run: python tests/test.py       # ✅ Updated path

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                         # ✅ Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: churn-model             # ✅ Downloads model_C=1.0.bin to root

      - name: Verify model exists
        run: |
          if [ -f "models/model_C=1.0.bin" ]; then
            echo "✅ Model ready for Docker build"
          else
            echo "❌ Model missing!"
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/churn-prediction:latest .

      - name: Push Docker image to ghcr.io
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/churn-prediction:latest

      - name: Print image URL
        run: |
          echo "🐳 Docker image pushed to:"
          echo "ghcr.io/${{ github.repository_owner }}/churn-prediction:latest"